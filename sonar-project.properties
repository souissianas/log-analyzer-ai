sonar.projectKey=log-analyzer-ai
sonar.projectName=Log Analyzer AI
sonar.projectVersion=2.1.0
sonar.organization=log-analyzer

# Sources
sonar.sources=backend,frontend/src
sonar.exclusions=\
  **/node_modules/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/alembic/versions/**,\
  **/test_semaine*.py,\
  **/tmp_*.py,\
  backend/setup_files.py,\
  backend/get_logs.py

# Test sources
sonar.tests=backend/tests,frontend/src/test,frontend/src/components
sonar.test.inclusions=**/test_*.py,**/*.test.jsx,**/*.test.js

# Python settings
sonar.python.version=3.10
sonar.python.coverage.reportPaths=backend/coverage.xml

# JavaScript/JSX settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.file.suffixes=.js,.jsx

# Code duplication
sonar.cpd.exclusions=**/migrations/**

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gate
sonar.qualitygate.wait=true

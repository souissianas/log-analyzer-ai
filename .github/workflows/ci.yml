name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:

  #####################################################################
  # FRONTEND
  #####################################################################

  frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm test -- --coverage --watchAll=false

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  #####################################################################
  # BACKEND
  #####################################################################

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loganalyzer
          POSTGRES_PASSWORD: changeme123
          POSTGRES_DB: loganalyzer
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U loganalyzer"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio coverage

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://loganalyzer:changeme123@localhost:5432/loganalyzer
          SQLITE_DB_PATH: /tmp/test_backend.db
          REDIS_URL: ""
          CHROMADB_HOST: ""
        run: |
          coverage run -m pytest tests -v
          coverage xml -o coverage.xml
          coverage report

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  #####################################################################
  # DOCKER
  #####################################################################

  docker:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t log-analyzer-backend:ci ./backend

      - name: Build Frontend Image
        run: docker build -t log-analyzer-frontend:ci ./frontend

      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: log-analyzer-backend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: log-analyzer-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  #####################################################################
  # SONARCLOUD
  #####################################################################

  sonarqube:
    name: SonarCloud Analysis

    runs-on: ubuntu-latest

    needs:
      - frontend
      - backend

    if: github.event_name == 'push'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  #####################################################################
  # HELM
  #####################################################################

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Lint Chart
        run: |
          helm lint helm/log-analyzer/
          helm template log-analyzer helm/log-analyzer/ --debug > /dev/null
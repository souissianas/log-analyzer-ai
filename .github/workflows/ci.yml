name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --coverage --reporter=verbose

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Backend
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: loganalyzer
          POSTGRES_PASSWORD: changeme123
          POSTGRES_DB: loganalyzer
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U loganalyzer"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest pytest-asyncio

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://loganalyzer:changeme123@localhost:5432/loganalyzer
          SQLITE_DB_PATH: /tmp/test_backend.db
          REDIS_URL: ""
          CHROMADB_HOST: ""
        run: |
          coverage run -m pytest tests/ -v
          coverage xml -o coverage.xml
          coverage report --show-missing

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─────────────────────────────────────────────────────────────
  # Docker
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t log-analyzer-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t log-analyzer-frontend:ci ./frontend

      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: log-analyzer-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: log-analyzer-frontend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─────────────────────────────────────────────────────────────
  # SonarQube
  # ─────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────────────────────────────
  # Helm
  # ─────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Lint Helm Chart
        run: |
          helm lint helm/log-analyzer/
          helm template log-analyzer helm/log-analyzer/ --debug > /dev/null

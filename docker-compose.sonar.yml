version: "3.8"
# Local SonarQube for code quality analysis
# Usage: docker compose -f docker-compose.sonar.yml up -d
# Then run: sonar-scanner (with sonar-project.properties)

services:
  sonarqube:
    image: sonarqube:10.6-community
    container_name: log-analyzer-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  sonar-db:
    image: postgres:15-alpine
    container_name: log-analyzer-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout: 2s
      retries: 10

volumes:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_pg_data:

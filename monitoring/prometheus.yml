global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager:9093 if deployed

scrape_configs:
  - job_name: log-analyzer-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

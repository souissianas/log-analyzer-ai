server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape logs from all Docker containers
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log wrapper
      - json:
          expressions:
            log: log
            stream: stream
            time: time
            attrs: attrs

      # Extract container name from Docker metadata
      - json:
          expressions:
            container_name: attrs.tag
          source: attrs

      # Try to parse inner JSON (our structured backend logs)
      - json:
          expressions:
            level: level
            logger: logger
            correlation_id: correlation_id
            message: message
          source: log

      # Add labels for Grafana filtering
      - labels:
          stream:
          level:
          logger:
          container_name:

      # Use Docker log timestamp
      - timestamp:
          source: time
          format: RFC3339Nano

      # Use the inner 'log' field as final log line
      - output:
          source: log

  # Backend service specific job for easy filtering
  - job_name: log-analyzer-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: log-analyzer-backend
          service: backend
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            log: log
            container_name: attrs.tag
          source: log

      - match:
          selector: '{container_name=~".*backend.*"}'
          stages:
            - json:
                expressions:
                  level: level
                  correlation_id: correlation_id
                  event: event
                source: log
            - labels:
                level:
                correlation_id:
                event:

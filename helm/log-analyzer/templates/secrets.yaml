apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backend.secretName }}
  labels:
    {{- include "log-analyzer.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | default "changeme123" | quote }}
  API_KEY: {{ .Values.apiKey | default "testkey123" | quote }}
  JWT_SECRET_KEY: {{ .Values.jwtSecretKey | default "change-me-in-production-long-random-string" | quote }}

apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "log-analyzer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: backend
    release: {{ .Release.Name }}

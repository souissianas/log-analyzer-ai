apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    {{- include "log-analyzer.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount.backend }}
  {{- end }}
  selector:
    matchLabels:
      app: backend
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: backend
        release: {{ .Release.Name }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      # SonarCloud: "Bind this Service Account to RBAC or disable
      # automountServiceAccountToken." This pod never calls the K8s API,
      # so it doesn't need its ServiceAccount token mounted at all.
      automountServiceAccountToken: false
      containers:
        - name: backend
          image: "{{ .Values.image.registry }}/{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: POSTGRES_PASSWORD
            - name: REDIS_URL
              value: "redis://redis:6379/0"  # NOSONAR: internal cluster-only traffic
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: CHROMADB_HOST
              value: "chromadb"
            - name: CHROMADB_PORT
              value: "8080"
            - name: OLLAMA_MODEL
              value: {{ .Values.backend.env.OLLAMA_MODEL | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.backend.env.CORS_ORIGINS | quote }}
            - name: OTLP_ENDPOINT
              value: {{ .Values.backend.env.OTLP_ENDPOINT | quote }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: API_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: JWT_SECRET_KEY
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 10

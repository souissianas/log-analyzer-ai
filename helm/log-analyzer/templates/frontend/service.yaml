apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "log-analyzer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: frontend
    release: {{ .Release.Name }}

{{- if .Values.celery.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    {{- include "log-analyzer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.celery.replicas }}
  selector:
    matchLabels:
      app: celery-worker
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: celery-worker
        release: {{ .Release.Name }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      # SonarCloud: "Bind this Service Account to RBAC or disable
      # automountServiceAccountToken." The celery worker never calls the
      # K8s API, so it doesn't need its ServiceAccount token mounted.
      automountServiceAccountToken: false
      containers:
        - name: celery
          image: "{{ .Values.image.registry }}/{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command: ["celery", "-A", "worker", "worker", "--loglevel=info", "--concurrency={{ .Values.celery.concurrency }}", "-Q", "analysis"]
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.secretName }}
                  key: POSTGRES_PASSWORD
            # SonarCloud: "Make sure that using clear-text protocols is
            # safe here." redis:// is plaintext, but this traffic never
            # leaves the cluster's internal ClusterIP network (redis
            # Service has no external exposure — see redis/deployment.yaml)
            # so there's no untrusted network segment to intercept it on.
            # Enabling Redis TLS would require cert management for an
            # internal-only hop, out of scope for this project.
            - name: REDIS_URL
              value: "redis://redis:6379/0"  # NOSONAR: internal cluster-only traffic, see comment above
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            - name: CHROMADB_HOST
              value: "chromadb"
            - name: CHROMADB_PORT
              value: "8080"
            - name: OLLAMA_MODEL
              value: {{ .Values.backend.env.OLLAMA_MODEL | quote }}
          resources:
            {{- toYaml .Values.celery.resources | nindent 12 }}
{{- end }}
